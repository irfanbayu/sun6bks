name: Nightly Smoke

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MIDTRANS_SMOKE_BASE_URL: ${{ secrets.MIDTRANS_SMOKE_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate smoke configuration
        run: |
          if [ -z "${MIDTRANS_SMOKE_BASE_URL}" ]; then
            echo "Missing MIDTRANS_SMOKE_BASE_URL secret"
            exit 1
          fi

      - name: Run nightly sandbox smoke
        run: npm run test:smoke:sandbox
